services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: titanbay
      POSTGRES_PASSWORD: titanbay
      POSTGRES_DB: titanbay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U titanbay"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://titanbay:titanbay@postgres:5432/titanbay
      JWT_SECRET: change-this-in-production
      PORT: 3000
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run db:migrate && npm run db:seed && node dist/index.js"

volumes:
  postgres_data: